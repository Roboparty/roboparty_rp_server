# RoboParty RP Server — server config
# 传输通道："ws" / "serial" / "bluetooth"，选哪个开哪个
transports:
  ws: true
  serial: false
  bluetooth: false

server:
  host: "0.0.0.0"
  port: 8765

serial:
  port: "/dev/ttyAMA0"
  baudrate: 115200

bluetooth:
  channel: 1

bms:
  bms_type: "TWS"
  socket_path: "/tmp/bms.sock"

telemetry:
  imu_hz: 100
  battery_hz: 1
  error_hz: 10
